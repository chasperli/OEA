    put:
      operationId: updateContinuumConfig
      summary: Continuum-Konfiguration aktualisieren (SCR-034)
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                levels:
                  type: array
                  items:
                    type: object
                    properties:
                      id:          { type: string, format: uuid }
                      name:        { type: string }
                      description: { type: string }
                      sortOrder:   { type: integer }
      responses:
        '200':
          description: Aktualisiert

  /admin/continuum/import:
