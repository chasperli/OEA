          schema: { type: string }
      responses:
        '200':
          description: Property-Definitionen
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PropertyDefinitionDetail' }
    post:
      operationId: createPropertyDefinition
      summary: Property-Definition anlegen
      tags: [Metamodell]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyDefinitionWrite' }
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PropertyDefinitionDetail' }

  /metamodel/property-definitions/{id}:
    put:
      operationId: updatePropertyDefinition
      summary: Property-Definition aktualisieren
      tags: [Metamodell]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PropertyDefinitionWrite' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PropertyDefinitionDetail' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      operationId: deletePropertyDefinition
