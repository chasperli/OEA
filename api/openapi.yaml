  # ── Service-Accounts (ADR-026, REQ-155) ───────────────────────────────────
  /admin/service-accounts:
    get:
      operationId: listServiceAccounts
      summary: Service-Accounts auflisten
      description: Alle Service-Accounts der Instanz (person_type=service-account).
      tags: [Admin]
      parameters:
        - name: active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Service-Account-Liste
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ServiceAccount' }
    post:
      operationId: createServiceAccount
      summary: Service-Account anlegen (REQ-155)
      description: |
        Legt einen Service-Account an (`persons.person_type=service-account`)
        und gibt `clientSecret` einmalig im Klartext zurück.
        Danach nur noch via Rotation abrufbar.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceAccountWrite' }
      responses:
        '201':
          description: Service-Account angelegt; clientSecret einmalig im Response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceAccountCreated' }
        '422':
          description: Ungültige Rolle oder Name bereits vergeben
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /admin/service-accounts/{id}:
    get:
      operationId: getServiceAccount
      summary: Service-Account-Detail
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      responses:
        '200':
          description: Service-Account (ohne clientSecret)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceAccount' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    put:
      operationId: updateServiceAccount
      summary: Service-Account aktualisieren (Name, Beschreibung, Rollen)
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceAccountWrite' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceAccount' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      operationId: deleteServiceAccount
      summary: Service-Account deaktivieren
      description: Soft-Deaktivierung (active=false). Credentials ungültig.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      responses:
        '204':
          description: Deaktiviert

  /admin/service-accounts/{id}/credentials/rotate:
    post:
      operationId: rotateServiceAccountCredentials
      summary: Service-Account-Credentials rotieren (REQ-155)
      description: |
        Erzeugt ein neues `clientSecret`. Das alte Secret ist sofort ungültig.
        Das neue Secret wird einmalig im Klartext zurückgegeben.
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      responses:
        '200':
          description: Neues Secret; altes sofort ungültig
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceAccountCreated' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /admin/settings:
    get:
      operationId: getSystemSettings
