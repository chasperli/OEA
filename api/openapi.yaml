      responses:
        '200':
          description: Einstellungen
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSettings' }
    put:
      operationId: updateSystemSettings
      summary: System-Einstellungen aktualisieren (SCR-038)
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemSettings' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSettings' }

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  AUDIT (Schema: audit.*, ADR-024, SCR-026/054)                        ║
  # ╚═════════════════════════════════════════════════════════════════════════╝
  /audit/events:
    get:
      operationId: listAuditEvents
      summary: Compliance-Audit-Log (SCR-054)
      description: |
        Liest aus `audit.events` + `audit.event_changes` (ADR-024).
        Erfordert Rolle `Auditor` oder `Admin`.
      tags: [Audit]
      parameters:
        - name: entityId
          in: query
          schema: { type: integer }
        - name: actorId
          in: query
          schema: { type: integer }
        - name: eventType
          in: query
          schema: { type: string }
        - name: source
          in: query
          schema: { type: string, enum: [UI, API, Job, Import] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Audit-Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  page: { $ref: '#/components/schemas/PageMeta' }
        '403':
          description: Unzureichende Rechte
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /audit/events/{id}/changes:
    get:
      operationId: getAuditEventChanges
      summary: Änderungsdetail eines Audit-Events (SCR-027)
      tags: [Audit]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Änderungsdetail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEvent' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  EXTERNE INTEGRATION – SCHREIBEN (ADR-026, optional)                   ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  /entities:
    post:
      operationId: createEntity
      summary: Entität anlegen
      description: |
        Legt eine neue Entität an. Für idempotentes Create-or-Update
        (bei bekannter `externalId`) bitte `PUT /entities/by-external-id/{externalId}`
        verwenden.
      tags: [Entities – Write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityWrite' }
      responses:
        '201':
          description: Angelegt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '409':
          description: "`externalId` bereits vergeben"
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Validierungsfehler
          content:
            application/problem+json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Problem'
                  - type: object
                    properties:
                      errors:
                        type: array
                        items: { $ref: '#/components/schemas/ValidationError' }

  /entities/{id}:
    put:
      operationId: replaceEntity
      summary: Entität ersetzen (vollständiges Update)
      tags: [Entities – Write]
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
        - name: version
          in: query
          schema: { type: integer }
          description: Optimistic-Lock-Version; fehlt → kein Konflikt-Check
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityWrite' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: Optimistic-Lock-Konflikt
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Validierungsfehler
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    patch:
      operationId: patchEntity
      summary: Entität partiell aktualisieren
      description: |
        Nur die mitgelieferten Felder werden geändert.
        Fehlende Felder bleiben unverändert.
        `properties`-Array: nur mitgelieferte Properties werden aktualisiert.
      tags: [Entities – Write]
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
        - name: version
          in: query
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/EntityWrite' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: Optimistic-Lock-Konflikt
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      operationId: deleteEntity
      summary: Entität soft-löschen
      tags: [Entities – Write]
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
        - name: reason
          in: query
          schema: { type: string }
      responses:
        '204':
          description: Soft-gelöscht
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /entities/by-external-id/{externalId}:
    put:
      operationId: upsertEntityByExternalId
      summary: Entität anlegen oder aktualisieren (Upsert per externalId)
      description: |
        Idempotentes Create-or-Update. Kernendpoint für externe Systeme (ADR-026).
        Gibt `201 Created` bei Neuanlage, `200 OK` bei Update zurück.
        Wiederholter Aufruf mit identischen Daten ist sicher.
      tags: [Entities – Write]
      parameters:
        - name: externalId
          in: path
          required: true
          schema: { type: string }
          description: "Stabile Quell-Kennung (URL-encoded, z.B. `git%3Aorg%2Frepo%2Fsvc`)"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityWrite' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '201':
          description: Neu angelegt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '422':
          description: Validierungsfehler
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /entities/validate:
    post:
      operationId: validateEntity
      summary: Entität validieren ohne Persistierung
      description: |
        Führt alle Validierungen durch (MetaTyp-Check, Mandatory-Properties,
        Pattern-Checks, Connection-Constraints) ohne zu persistieren.
        Nützlich für externe Systeme vor dem eigentlichen Write.
      tags: [Entities – Write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityWrite' }
      responses:
        '200':
          description: Validierungsergebnis
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationResult' }

  /entities/batch:
    post:
      operationId: batchWriteEntities
      summary: Entitäten und Verbindungen im Batch anlegen/aktualisieren
      description: |
        Schreibt bis zu 500 Entitäten und 500 Verbindungen in einem Request.
        Für externe Systeme mit `strategy: upsert` der bevorzugte Endpoint
        (ADR-026). `?dryRun=true` → Validierung ohne Persistierung.
      tags: [Entities – Write]
      parameters:
        - name: dryRun
          in: query
          schema: { type: boolean, default: false }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchWriteRequest' }
      responses:
        '200':
          description: Batch-Ergebnis (auch bei Teilfehlern wenn atomic=false)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchWriteResponse' }
        '422':
          description: Gesamter Batch ungültig (z.B. leerer Body, atomic=true mit Fehler)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /connections:
    post:
      operationId: createConnection
      summary: Verbindung zwischen zwei Entitäten anlegen
      description: |
        Legt eine Verbindungsentität an (metatype.is_connection=true).
        Validiert gegen `metatype_connection_constraints`.
        Source/Target können via interne ID oder `externalId` referenziert werden.
      tags: [Entities – Write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConnectionWrite' }
      responses:
        '201':
          description: Verbindung angelegt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '404':
          description: Source- oder Target-Entität nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Connection-Constraint verletzt
          content:
            application/problem+json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Problem'
                  - type: object
                    properties:
                      errors:
                        type: array
                        items: { $ref: '#/components/schemas/ValidationError' }

  # ── Metamodell-Discovery (ADR-026) ─────────────────────────────────────────
  /metamodel/allowed-connections:
    get:
      operationId: getAllowedConnections
      summary: Erlaubte Verbindungen zwischen zwei MetaTypen
      description: |
        Beantwortet: "Welche Connection-MetaTypen sind zwischen MetaTyp A und B erlaubt?"
        Schreibende Systeme nutzen diesen Endpoint um Connection-Writes vorab
        zu validieren. Quelle: `metatype_connection_constraints`.
      tags: [Metamodell]
      parameters:
        - name: sourceMetatypeId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: targetMetatypeId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Erlaubte Verbindungs-MetaTypen
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AllowedConnectionResult' }

  # ── Metamodell-Paket Import/Export (ADR-026) ───────────────────────────────
  /admin/metamodel/export:
    get:
      operationId: exportMetamodelPackage
      summary: Metamodell-Paket exportieren (ADR-026)
      description: |
        Exportiert das vollständige Metamodell als portables JSON-Paket:
        MetaTypen, Property-Definitionen, Viewpoints, Shape-Assignments, i18n-Labels.
        Dient als Grundlage für Metamodell-Bibliotheken und den Upsert-Workflow
        externer Systeme (externalId-Namespace, MetaTyp-IDs).
      tags: [Admin]
      parameters:
        - name: configId
          in: query
          schema: { type: string, format: uuid }
          description: "Specific metamodel config; ohne Parameter → instanzweite Konfiguration"
        - name: includeI18n
          in: query
          schema: { type: boolean, default: true }
          description: "i18n-Bundles in Paket einschliessen"
      responses:
        '200':
          description: Metamodell-Paket
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetamodelPackage' }

  /admin/metamodel/import:
    post:
      operationId: importMetamodelPackage
      summary: Metamodell-Paket importieren (ADR-026)
      description: |
        Importiert ein Metamodell-Paket (z.B. ArchiMate 3.2 Basis-Metamodell).
        `merge`: ergänzt fehlende MetaTypen/Properties, aktualisiert vorhandene.
        `replace`: ersetzt das Metamodell vollständig (nur wenn keine Entitäten
        des alten Metamodells existieren).
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/MetamodelPackage'
                - type: object
                  properties:
                    strategy:
                      type: string
                      enum: [merge, replace]
                      default: merge
      responses:
        '200':
          description: Import-Ergebnis
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResult' }
        '409':
          description: "`replace` nicht möglich (bestehende Entitäten des alten Metamodells)"
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Paket-Format ungültig
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ── Shape-Palette je Viewpoint ─────────────────────────────────────────────
  /admin/viewpoints/{id}/shape-palette:
    get:
      operationId: getShapePalette
      summary: Shape-Palette für einen Viewpoint (ADR-026)
      description: |
        Welches Shape/Icon bekommt welcher MetaTyp in diesem Viewpoint?
        Schreibende Systeme und Diagramm-Editor laden diese Palette um
        Entitäten korrekt darzustellen ohne Shape-Wissen zu hard-coden.
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Viewpoint-Key (Slug)
      responses:
        '200':
          description: Shape-Palette
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ShapeAssignment' }
        '404':
          description: Viewpoint nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    put:
      operationId: updateShapePalette
      summary: Shape-Palette aktualisieren
      tags: [Admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/ShapeAssignment' }
      responses:
        '200':
          description: Aktualisiert
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ShapeAssignment' }

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  PORTAL (Read-only, SCR-050–054)                                       ║
  # ╚═════════════════════════════════════════════════════════════════════════╝
  /portal/catalog:
    get:
      operationId: getPortalCatalogView
      summary: Portal-Katalog (SCR-050)
      description: |
        Read-only-Version von `/views/catalog`. Reduzierter Auth-Scope (portal-reader).
        Bestimmte Properties werden gemäss Property-Sichtbarkeits-Konfiguration
        (SCR-032) ausgeblendet (Visibility `always` / `default` / `hidden`).
      tags: [Portal]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: filter[name]
          in: query
          schema: { type: string }
        - name: filter[metatypeId]
          in: query
          schema: { type: array, items: { type: string, format: uuid } }
          style: form
          explode: false
      responses:
        '200':
          description: Entitätenliste (reduzierte Properties)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/EntityListItem' }
                  page:          { $ref: '#/components/schemas/PageMeta' }
                  filterOptions: { $ref: '#/components/schemas/CatalogFilterOptions' }
        '401':
          description: Nicht authentifiziert
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /portal/catalog/{id}:
    get:
      operationId: getPortalEntityDetail
      summary: Portal-Entity-Detail (SCR-051)
      description: Read-only. Kein Edit-Button; Properties gemäss Sichtbarkeits-Konfiguration.
      tags: [Portal]
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Entitäts-Detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntityDetail' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /portal/diagrams/{id}:
    get:
      operationId: getPortalDiagramView
      summary: Portal-Diagramm-Viewer (SCR-052)
      description: Read-only. Kein Editing; Shapes nicht selektierbar/bewegbar.
      tags: [Portal]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      responses:
        '200':
          description: Diagramm
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagramView' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /portal/dashboards/{id}/data:
    get:
      operationId: getPortalDashboardData
      summary: Portal-Dashboard-Daten (SCR-053)
      description: Read-only. Keine Widget-Konfiguration; nur Datenpunkte.
      tags: [Portal]
      parameters:
        - $ref: '#/components/parameters/UuidIdParam'
      responses:
        '200':
          description: Dashboard-Daten
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardData' }
        '404':
          description: Nicht gefunden
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /portal/audit/events:
    get:
      operationId: getPortalAuditEvents
      summary: Portal-Änderungshistorie (SCR-054)
      description: |
        Read-only-Sicht auf Audit-Events. Kein Restore-Button.
        Gefiltert auf öffentlich sichtbare Event-Typen.
      tags: [Portal]
      parameters:
        - name: entityId
          in: query
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Audit-Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  page: { $ref: '#/components/schemas/PageMeta' }

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  SSE – Invalidierungskanal (ADR-025)                                   ║
  # ╚═════════════════════════════════════════════════════════════════════════╝
  /events/stream:
    get:
      operationId: getEventStream
      summary: Server-Sent Events — Cache-Invalidierung (ADR-025)
      description: |
        Persistente SSE-Verbindung für Cache-Invalidierung.
        Events: `i18n_invalidated`, `metamodel_updated`.
        Deaktivierbar via `oea.sse.enabled=false`.
      tags: [Events]
      responses:
        '200':
          description: SSE-Stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"i18n_invalidated","locale":"de"}

                  data: {"type":"metamodel_updated"}

# ═════════════════════════════════════════════════════════════════════════════
# TAGS
# ═════════════════════════════════════════════════════════════════════════════
tags:
  - name: Views – Catalog
    description: Katalog-Browser und Entity-Detail (SCR-020/012)
  - name: Views – Navigation
    description: Explorer / Navigationsbaum (SCR-010/011)
  - name: Views – Editoren
    description: Diagramm-, Lineage-, Dashboard-, Roadmap-Editoren (SCR-021–025)
  - name: Entities
    description: Entity-Historie und Restore (UC-14/15/16)
  - name: Entities – Write
    description: |
      Schreib-Endpoints für Entitäten und Verbindungen (ADR-026, optional).
      Erfordert Feature-Flag `oea.integration.enabled=true` und Rolle `integration-writer`.
      `?dryRun=true` verfügbar auf Batch- und Validate-Endpoints.
  - name: Metamodell
    description: MetaTypen, Property-Definitionen und Mappings (SCR-030)
  - name: Admin
    description: Administrations-Screens (SCR-031–038)
  - name: Audit
    description: Compliance-Audit-Log (ADR-024, SCR-054)
  - name: Portal
    description: Web-Portal Read-only-Endpoints (SCR-050–054)
  - name: I18N
    description: Dynamische Labels mit ETag-Caching (ADR-025)
  - name: Events
    description: Server-Sent Events für Cache-Invalidierung
