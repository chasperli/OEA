name: CI – Requirements Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Link-Validierung ───────────────────────────────────────────────────
  validate-links:
    name: Link-Validierung (concept/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Relative Links prüfen
        run: python3 scripts/validate_links.py

  # ── 2. Requirements-Vollständigkeit ──────────────────────────────────────
  requirements-quality:
    name: Requirements-Vollständigkeit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Artefakt-Zählung
        run: |
          echo "SH:  $(ls business-analysis/stakeholders/SH-*.md 2>/dev/null | wc -l)"
          echo "UC:  $(ls requirements/use-cases/UC-*.md          2>/dev/null | wc -l)"
          echo "REQ: $(ls requirements/req/REQ-*.md               2>/dev/null | wc -l)"
          echo "US:  $(ls requirements/user-stories/US-*.md       2>/dev/null | wc -l)"
          echo "ADR: $(ls adrs/ADR-*.md                           2>/dev/null | wc -l)"

      - name: Use-Case-Vollständigkeit prüfen
        run: |
          failed=0
          for f in requirements/use-cases/UC-*.md; do
            grep -q "^primary_actor:" "$f"  || { echo "FEHLT primary_actor: $f"; failed=1; }
            grep -q "Akzeptanzkriteri"  "$f" || { echo "FEHLT Akzeptanzkriterien: $f"; failed=1; }
            grep -qiE "concept|konzept|§" "$f" || { echo "FEHLT Konzept-Bezug: $f"; failed=1; }
          done
          exit $failed

      - name: REQ-Vollständigkeit prüfen
        run: |
          failed=0
          for f in requirements/req/REQ-*.md; do
            grep -q "^type:"   "$f" || { echo "FEHLT type: $f";   failed=1; }
            grep -q "^status:" "$f" || { echo "FEHLT status: $f"; failed=1; }
            grep -q "UC-"      "$f" || { echo "FEHLT UC-Ref: $f"; failed=1; }
          done
          exit $failed

      - name: US-Vollständigkeit und Referenz-Integrität prüfen
        run: |
          failed=0
          for f in requirements/user-stories/US-*.md; do
            grep -q "UC-"  "$f" || { echo "FEHLT UC-Ref: $f";  failed=1; }
            grep -q "REQ-" "$f" || { echo "FEHLT REQ-Ref: $f"; failed=1; }
            # Verwaiste REQ-Referenzen
            for req in $(grep -o "REQ-[0-9]*" "$f"); do
              num=${req#REQ-}
              ls requirements/req/REQ-${num}-*.md >/dev/null 2>&1 \
                || { echo "BROKEN REQ-Ref: $f → $req"; failed=1; }
            done
            # Verwaiste UC-Referenzen
            for uc in $(grep -o "UC-[0-9]*" "$f"); do
              num=${uc#UC-}
              ls requirements/use-cases/UC-${num}-*.md >/dev/null 2>&1 \
                || { echo "BROKEN UC-Ref: $f → $uc"; failed=1; }
            done
          done
          exit $failed

      - name: ADR-Vollständigkeit prüfen
        run: |
          failed=0
          for f in adrs/ADR-*.md; do
            grep -q "Entscheider" "$f" || { echo "FEHLT Entscheider: $f"; failed=1; }
          done
          exit $failed

      - name: ADR-Referenzen auf Existenz prüfen
        run: |
          failed=0
          for f in requirements/req/REQ-*.md requirements/user-stories/US-*.md; do
            for adr in $(grep -o "ADR-[0-9]*" "$f" 2>/dev/null); do
              num=${adr#ADR-}
              ls adrs/ADR-${num}-*.md >/dev/null 2>&1 \
                || { echo "BROKEN ADR-Ref: $f → $adr"; failed=1; }
            done
          done
          exit $failed

  # ── 3. OpenAPI-Syntax ─────────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Redocly CLI installieren
        run: npm install -g @redocly/cli@latest
      - name: OpenAPI validieren
        run: redocly lint api/openapi.yaml --format=github-actions

  # ── 4. Markdown-Lint (informell bis Basis bereinigt) ─────────────────────
  markdown-lint:
    name: Markdown-Lint
    runs-on: ubuntu-latest
    # continue-on-error bis bestehende Dateien bereinigt sind
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            requirements/**/*.md
            adrs/*.md
            business-analysis/**/*.md
            docs/*.md
          config: .markdownlint.json

